<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>出题喵喵 QuizMiao</title>
<meta property="og:title" content="出题喵喵 · AI出题练习">
<meta property="og:description" content="AI 自动生成练习题，覆盖多个知识点，随时随地巩固知识！">
<meta property="og:type" content="website">
<meta property="og:locale" content="zh_CN">
<meta property="og:site_name" content="出题喵喵">
<meta property="og:image" content="icon.png">
<link rel="stylesheet" href="css/style.css?v=13">
<style>
/* Toast 组件 */
#toast { position:fixed; top:calc(54px + env(safe-area-inset-top, 0px)); left:50%; transform:translateX(-50%); background:rgba(0,0,0,.78); color:#fff; font-size:13px; padding:10px 20px; border-radius:8px; z-index:9999; opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap; max-width:80vw; overflow:hidden; text-overflow:ellipsis; }
#toast.show { opacity:1; }
/* Loading */
#loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,.9); z-index:9998; display:none; flex-direction:column; align-items:center; justify-content:center; }
#loading-overlay.show { display:flex; }
</style>
</head>
<body>

<!-- 导航栏（标准移动端标题栏，44px） -->
<div class="nav-bar">
  <div class="nav-bar-inner">
    <div class="nav-back" id="nav-back" onclick="App.navigateBack(1)" style="display:none">
      <svg width="12" height="20" viewBox="0 0 12 20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="10 2 2 10 10 18"/></svg>
    </div>
    <div class="nav-title">出题喵喵</div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Loading 遮罩 -->
<div id="loading-overlay">
  <div class="dot-spinner">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="loading-text" id="loading-title"></div>
  <div class="loading-sub" id="loading-sub"></div>
</div>

<!-- ====== Page: index (首页) ====== -->
<div id="page-index" class="page">
  <div class="card">
    <div class="section-title">📝 输入知识内容</div>
    <div class="section-desc">粘贴文本或多个链接，AI 自动生成练习题</div>

    <div class="input-tabs">
      <div class="input-tab active" data-tab="text" onclick="App.pages.index.switchTab('text')">📋 文本</div>
      <div class="input-tab" data-tab="urls" onclick="App.pages.index.switchTab('urls')">🔗 链接</div>
    </div>

    <div id="tab-text">
      <textarea class="input-area" id="manual-text" placeholder="在此粘贴知识点内容...&#10;例如：单词表、语法规则、数学公式等"></textarea>
    </div>

    <div id="tab-urls" style="display:none">
      <div id="url-list"></div>
      <button class="btn btn-outline btn-sm" onclick="App.pages.index.addUrl()" style="margin-top:4px">+ 添加链接</button>
      <div class="msg msg-info" style="margin-top:8px">💡 支持多个网页链接，逐个抓取后合并出题。静态网页效果最佳。</div>
    </div>

    <div class="action-row">
      <button class="btn btn-primary" id="btn-generate" onclick="App.pages.index.startGenerate()">生成练习题</button>
      <div class="qty-row">
        <span class="qty-label">题数</span>
        <select id="qty-select" onchange="App.pages.index.onQtyChange(this.value)" class="qty-picker">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="40">40</option>
          <option value="50">50</option>
        </select>
      </div>
    </div>

    <div id="index-error" class="msg msg-error" style="display:none"></div>
  </div>

  <div class="footer-text">出题喵喵 QuizMiao · AI 驱动 · 无需配置</div>
</div>

<!-- ====== Page: confirm (确认页) ====== -->
<div id="page-confirm" class="page" style="display:none">
  <div class="card">
    <div class="section-title" id="confirm-title">✅ 已生成 <span id="confirm-count">0</span> 道题</div>
    <div class="loading-sub" id="confirm-loading-sub" style="display:none">请耐心等待，不要离开页面</div>
    <div class="tags-row" id="confirm-tags"></div>
    <!-- 进度条 -->
    <div class="confirm-progress" id="confirm-progress" style="display:none">
      <div class="confirm-progress-bar" id="confirm-progress-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="section-hint">题目列表</div>
  <div class="qconf-list" id="confirm-list"></div>

  <!-- 错误提示 -->
  <div id="confirm-error" class="msg msg-error" style="display:none; margin:16px;"></div>

  <div class="bottom-bar">
    <button class="btn btn-primary btn-flex" id="btn-start-practice" onclick="App.pages.confirm.startPractice()" disabled>开始练习</button>
    <button class="btn btn-icon" onclick="App.share()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    </button>
    <button class="btn btn-icon" onclick="App.goHome()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
  </div>
</div>

<!-- ====== Page: practice (练习页) ====== -->
<div id="page-practice" class="page" style="display:none">
  <div class="card">
    <div class="practice-header">
      <span class="progress-info" id="prac-progress">第 1/0 题</span>
      <span class="progress-info" id="prac-score">得分 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="prac-bar" style="width:0%"></div>
    </div>

    <span class="q-tag" id="prac-cat"></span>
    <div class="q-text" id="prac-question"></div>

    <div class="option-list" id="prac-options"></div>

    <div class="feedback" id="prac-feedback" style="display:none">
      <div class="fb-result" id="prac-fb-result"></div>
      <div class="fb-exp" id="prac-fb-exp"></div>
    </div>

    <div class="next-row">
      <button class="btn btn-primary" id="btn-next" onclick="App.pages.practice.nextQ()" disabled>下一题 →</button>
    </div>
  </div>
</div>

<!-- ====== Page: result (结果页) ====== -->
<div id="page-result" class="page" style="display:none">
  <div class="card result-wrap">
    <div class="section-title">练习完成</div>
    <div class="score-circle">
      <span class="score-num" id="result-score">0/0</span>
      <span class="score-pct" id="result-pct">正确率 0%</span>
    </div>
    <div class="result-desc" id="result-desc"></div>

    <div class="result-btns">
      <button class="btn btn-primary" onclick="App.pages.result.retry()">再做一次</button>
      <button class="btn btn-outline" onclick="App.goConfirm()">题目列表</button>
      <button class="btn btn-outline" onclick="App.goHome()">返回首页</button>
    </div>
  </div>

  <div class="card wrong-section" id="wrong-section" style="display:none">
    <div class="section-title">错题回顾（<span id="wrong-count">0</span> 道）</div>
    <div id="wrong-list"></div>
  </div>
</div>

<!-- 分享弹窗 -->
<div id="share-modal" class="modal" style="display:none">
  <div class="modal-mask" onclick="App.closeShareModal()"></div>
  <div class="modal-content">
    <div class="modal-title">分享给好友</div>
    <div class="modal-desc">选择分享方式，内容将自动复制到剪贴板</div>
    <div class="modal-options">
      <button class="modal-option" onclick="App._doShareLink()">
        <div class="modal-opt-icon">🔗</div>
        <div class="modal-opt-label">分享链接</div>
      </button>
      <button class="modal-option" onclick="App._doShareQR()">
        <div class="modal-opt-icon">📷</div>
        <div class="modal-opt-label">分享二维码</div>
      </button>
    </div>
    <div id="share-qr-wrap" style="display:none">
      <div class="qr-hint">长按图片保存或复制</div>
      <img id="share-qr-img" src="" alt="分享二维码" />
      <div class="qr-caption" id="share-qr-caption"></div>
    </div>
    <button class="modal-close" onclick="App.closeShareModal()">取消</button>
  </div>
</div>

<script src="js/store.js?v=13"></script>
<script src="js/api.js?v=13"></script>
<script src="js/app.js?v=13"></script>
</body>
</html>
